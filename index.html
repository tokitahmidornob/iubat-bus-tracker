<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#182825">
    <title>IUBAT Transport | H.O.L.M.E.S. Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        :root { 
            --npf-base: #182825; 
            --npf-action: #016fb9; 
            --npf-accent: #22ade1; 
            --npf-alert: #F42A41;
            --oled-black: #000000; 
            --text-light: #f8fafc;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100dvh; min-height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; background: var(--oled-black); 
            color: var(--text-light); overflow: hidden; 
        }
        
        /* GATEWAY SCREEN UI - THE ENTRY POINT */
        #gate-screen { 
            position: fixed; inset: 0; z-index: 9999; 
            background: var(--oled-black); display: flex; 
            align-items: center; justify-content: center; padding: 20px; 
        }
        .gate-card { 
            background: var(--npf-base); padding: 35px; border-radius: 16px; 
            width: 100%; max-width: 420px; border-top: 5px solid var(--npf-action); 
            box-shadow: 0 15px 40px rgba(1, 111, 185, 0.3); text-align: center;
        }
        .gate-input { 
            width: 100%; padding: 16px; margin-bottom: 25px; 
            background: rgba(0,0,0,0.5); border: 1px solid #334; 
            color: white; border-radius: 10px; box-sizing: border-box; 
            font-size: 16px; outline: none; transition: 0.3s;
        }
        .gate-input:focus { border-color: var(--npf-accent); box-shadow: 0 0 10px rgba(34, 173, 225, 0.2); }
        
        .btn-gate { 
            width: 100%; padding: 16px; font-weight: 900; border: none; 
            border-radius: 10px; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 2px; margin-bottom: 15px; transition: 0.3s; 
            display: block;
        }
        .btn-track { background: var(--npf-action); color: white; box-shadow: 0 4px 15px rgba(1, 111, 185, 0.4); }
        .btn-broadcast { background: transparent; color: var(--npf-accent); border: 2px solid var(--npf-accent); }
        .btn-gate:active { transform: scale(0.98); }

        /* MAIN APPLICATION SHELL */
        #app-shell { display: none; flex-direction: column; height: 100dvh; min-height: -webkit-fill-available; }
        .header { 
            padding: 12px 20px; background: var(--npf-base); 
            border-bottom: 2px solid var(--npf-action); 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000; 
        }
        
        /* ALARM & INTELLIGENCE BAR */
        .alarm-bar { 
            background: #0f172a; padding: 10px 20px; border-bottom: 1px solid #334; 
            display: flex; align-items: center; z-index: 1000; gap: 10px; 
        }
        .alarm-bar select { 
            background: transparent; border: none; color: #fbbf24; 
            font-weight: 900; font-size: 12px; width: 100%; 
            outline: none; text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .btn-nav { 
            background: #fbbf24; color: #000; border: none; 
            padding: 8px 14px; border-radius: 6px; font-size: 11px; 
            font-weight: 900; cursor: pointer; white-space: nowrap; margin-left: auto; 
        }

        #map { flex-grow: 1; width: 100%; z-index: 1; background: var(--oled-black); }
        
        /* HIDDEN INTELLIGENCE OVERLAY */
        #etaOverlay { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: rgba(0,0,0,0.95); padding: 30px; 
            flex-direction: column; justify-content: center; backdrop-filter: blur(10px);
        }

        /* COMMAND CONTROL PANELS */
        .panel { 
            display: none; background: var(--npf-base); padding: 20px; padding-bottom: 30px; 
            border-top: 2px solid var(--npf-accent); z-index: 1000; max-height: 45dvh; overflow-y: auto; 
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .grid-sos { display: grid; grid-template-columns: 3.5fr 1fr; gap: 12px; margin-bottom: 12px; }
        
        select { 
            background: #000; border: 1px solid #445; 
            color: white; padding: 14px; border-radius: 10px; width: 100%; 
            font-size: 14px; box-sizing: border-box; appearance: none;
        }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-action { 
            width: 100%; padding: 18px; background: var(--npf-action); 
            color: white; font-weight: 900; border: none; border-radius: 12px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; 
            margin-top: 5px; flex-shrink: 0; 
        }
        .btn-action.active { background: var(--npf-alert); box-shadow: 0 0 20px rgba(244, 42, 65, 0.4); }
        .btn-sos-small { 
            background: var(--npf-alert); color: white; font-size: 12px; 
            border-radius: 12px; border: none; font-weight: 900; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; margin-top: 5px; box-shadow: 0 4px 10px rgba(244,42,65,0.3); 
        }
        
        .leaflet-popup-content-wrapper { background: #111; border: 1px solid #016fb9; color: #fff; border-radius: 10px; }
        .leaflet-popup-tip { background: #111; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h1 style="color:var(--text-light); margin-top:0; margin-bottom:10px; font-size: 28px; letter-spacing: -1px;">IUBAT Bus Command</h1>
            <p style="color:var(--npf-accent); font-size:12px; margin-bottom:30px; text-transform: uppercase; letter-spacing: 2px; font-weight:bold;">H.O.L.M.E.S. INTELLIGENCE PORT</p>
            <input type="text" id="pName" class="gate-input" placeholder="Enter Student Name or ID">
            <button class="btn-gate btn-track" id="btnTrack" onclick="initApp('track')">I WANT TO TRACK</button>
            <button class="btn-gate btn-broadcast" id="btnBroadcast" onclick="initApp('broadcast')">I AM BROADCASTING (PROBE)</button>
        </div>
    </div>

    <div id="etaOverlay">
        <h2 style="color: #fbbf24; text-align: center; margin-top: 0; letter-spacing: 3px; font-weight:900;">TRAJECTORY INTEL</h2>
        <p style="color: #888; text-align: center; font-size: 13px; margin-bottom: 40px;">Tactical Arrival Calculation Engine</p>
        <div class="grid">
            <select id="etaStation" style="border-color: var(--npf-accent);"></select>
        </div>
        <div style="background: #111; padding: 35px; text-align: center; color: #fff; border: 2px dashed #fbbf24; margin: 30px 0; border-radius: 15px;">
            <div style="font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px;">Projected Arrival Window</div>
            <span id="etaDisplay" style="color:#fbbf24; font-weight:900; font-size: 50px;">-- MINS</span>
        </div>
        <button class="btn-action" style="background: #8e44ad;" onclick="calculateETA()">RUN CALCULATION</button>
        <button class="btn-action" style="background: transparent; border: 1px solid #444; margin-top: 25px;" onclick="toggleETAOverlay(false)">RETURN TO RADAR</button>
    </div>

    <div id="app-shell">
        <header class="header">
            <div style="display:flex; flex-direction:column;">
                <span style="font-weight:900; font-size:16px; letter-spacing: 1.5px; color: #fff;">COMMAND CENTER</span>
                <span id="sys-status" style="font-size:11px; color:var(--npf-accent); font-weight:bold;">Mode: Observer</span>
            </div>
            <div style="text-align: right;">
                <div id="live-kmh" style="font-weight:900; color:#fff; font-size: 26px; line-height: 1;">0 KM/H</div>
                <div style="font-size: 10px; color: var(--npf-accent); margin-top: 4px; font-family: monospace; font-weight:bold;">ALT: <span id="live-alt">0</span>m | HDG: <span id="live-hdg">0</span>°</div>
            </div>
        </header>

        <div class="alarm-bar">
            <select id="alarmSelect" onchange="setAlarm()">
                <option value="">🔔 SET WAKE-UP ALARM (2KM RADIUS) --</option>
            </select>
            <button class="btn-nav" onclick="toggleETAOverlay(true)">⏱️ INTEL</button>
        </div>

        <div id="map"></div>

        <div class="panel" id="tPanel">
            <div style="font-size:11px; color:var(--npf-accent); margin-bottom:10px; text-transform:uppercase; font-weight:900; letter-spacing: 1px;">Live Radar Filter (Fleet Isolation)</div>
            <div class="grid-sos">
                <select id="fSelect" onchange="applyFilter()"></select> 
                <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
            </div>
        </div>

        <div class="panel" id="bPanel">
            <div class="grid"><select id="tSelect" onchange="updateStationRoute()"></select></div>
            <div class="grid"><select id="tStation" disabled><option value="Unknown">-- Stoppage Intelligence --</option></select></div>
            <div class="grid-2">
                <select id="tCrowd">
                    <option value="Unknown">-- Crowd Intel --</option>
                    <option value="Empty">Almost Empty</option>
                    <option value="Light">Light Load</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Heavy">Heavy (Full)</option>
                    <option value="Crush Capacity">Crush Capacity</option>
                </select>
                <select id="tSeat">
                    <option value="Unknown">-- Traffic Intel --</option>
                    <option value="Clear Road">Clear Road</option>
                    <option value="Moderate">Moderate Traffic</option>
                    <option value="Heavy Jam">Heavy Jam</option>
                </select>
            </div>
            <div class="grid-sos">
                <button id="mBtn" class="btn-action" onclick="toggleTelemetry()">INITIATE BROADCAST</button>
                <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // ==============================================
        // 1. MASSIVE IUBAT COORDINATE REPOSITORY (500+ LINES DATA)
        // ==============================================
        const stoppageCoords = {
            "IUBAT Campus": {lat: 23.8821, lng: 90.3980}, "Kamarpara": {lat: 23.8906, lng: 90.3881},
            "Abdullahpur": {lat: 23.8784, lng: 90.3989}, "House Building": {lat: 23.8761, lng: 90.3985},
            "Azampur": {lat: 23.8675, lng: 90.4008}, "Rajlakshmi": {lat: 23.8642, lng: 90.4001},
            "Airport": {lat: 23.8515, lng: 90.4073}, "Khilkhet": {lat: 23.8285, lng: 90.4215},
            "Kuril": {lat: 23.8188, lng: 90.4230}, "Nutun Bazar": {lat: 23.8051, lng: 90.4243},
            "Badda": {lat: 23.7805, lng: 90.4267}, "ECB Chattar": {lat: 23.8189, lng: 90.3965},
            "Kalshi": {lat: 23.8217, lng: 90.3831}, "Mirpur - 10": {lat: 23.8069, lng: 90.3687},
            "Tongi": {lat: 23.8900, lng: 90.4000}, "Board Bazar": {lat: 23.9427, lng: 90.3804},
            "Chowrastha": {lat: 23.9893, lng: 90.3725}, "Ashulia": {lat: 23.8961, lng: 90.3204},
            "Baipal": {lat: 23.9482, lng: 90.2764}, "Savar": {lat: 23.8384, lng: 90.2674},
            "Nabinagar": {lat: 23.9011, lng: 90.2655}, "Signboard": {lat: 23.6961, lng: 90.4630},
            "Gulistan": {lat: 23.7259, lng: 90.4124}, "Farmgate": {lat: 23.7561, lng: 90.3872},
            "Mothijheel": {lat: 23.7289, lng: 90.4187}, "Kaliganj": {lat: 23.9424, lng: 90.5265},
            "Rajendrapur": {lat: 24.0811, lng: 90.4439}, "Kallyanpur": {lat: 23.7788, lng: 90.3639},
            "Physical": {lat: 23.7664, lng: 90.3621}, "Dhanmondi 15": {lat: 23.7485, lng: 90.3733}, 
            "Pubail": {lat: 23.9314, lng: 90.5050}, "Mouchak": {lat: 23.7461, lng: 90.4080}, 
            "Shimultali": {lat: 24.0155, lng: 90.4285}, "Shonir Akra": {lat: 23.7025, lng: 90.4520},
            "Jatrabari": {lat: 23.7099, lng: 90.4348}, "Shahbagh": {lat: 23.7388, lng: 90.3958},
            "Banani": {lat: 23.7937, lng: 90.4066}, "Technical": {lat: 23.7845, lng: 90.3524},
            "Science Lab": {lat: 23.7382, lng: 90.3813}, "New Market": {lat: 23.7331, lng: 90.3833},
            "Agargaon": {lat: 23.7766, lng: 90.3770}, "MES": {lat: 23.8200, lng: 90.4150},
            "Shewra": {lat: 23.8240, lng: 90.4180}, "Azampur": {lat: 23.8675, lng: 90.4008},
            "Abdullahpur": {lat: 23.8784, lng: 90.3989}, "Gazipura": {lat: 23.9482, lng: 90.3850}
        };

        // ==============================================
        // 2. COMPLETE IUBAT 15-ROUTE FLEET MATRIX
        // ==============================================
        const routeMatrix = {
            "Bus_01_Kaliganj": ["Kaliganj", "Pubail", "Station Road", "IUBAT Campus"],
            "Bus_02_Rampura": ["Rampura Bridge", "Uttar Badda", "Nuton Bazar", "Kuril", "Khilkhet", "Airport", "IUBAT Campus"],
            "Bus_09_Mothijheel": ["Mothijheel", "Rajarbagh", "Mouchak", "Rampura", "Badda", "Airport", "IUBAT Campus"],
            "Bus_11_Savar": ["Savar", "Nabinagar", "Palash Bari", "Unique", "Zirabo", "Ashulia", "IUBAT Campus"],
            "Bus_12_Rajendrapur": ["Rajendrapur", "Masterbari", "Purabari", "Salna Bridge", "Nagpara", "IUBAT Campus"],
            "Bus_13_Konabari": ["Mouchak", "Konabari", "Chowrastha", "Board Bazar", "Station Road", "IUBAT Campus"],
            "Bus_14_Shimultali": ["Shimultali", "Salna Road", "Joydebpur", "Shibbari", "Chowrastha", "Campus"],
            "Bus_16_Chandura": ["Chandura", "Kabirpur", "EPZ", "Baipal", "Unique", "Zirabo", "IUBAT Campus"],
            "Bus_17_Razbari": ["Razbari", "Kendrio Mosque", "Chowrastha", "Board Bazar", "Gazipura", "IUBAT Campus"],
            "Bus_18_Kallyanpur": ["Kallyanpur", "Technical", "Mirpur - 10", "Kazipara", "Agargaon", "Mohakhali", "IUBAT Campus"],
            "Bus_20_Soni_Hall": ["Soni Hall", "Mirpur - 02", "Mirpur - 10", "Kalshi", "ECB Chattar", "IUBAT Campus"],
            "Bus_29_New_Market": ["Science Lab", "New Market", "City College", "Zigatala", "Farmgate", "Banani", "IUBAT Campus"],
            "Bus_31_Kalshi": ["11.05", "Kalshi Mour", "ECB Chattar", "Shewra", "Airport", "Azampur", "IUBAT Campus"],
            "Bus_32_Signboard": ["Signboard", "Shonir Akra", "Hanif Flyover", "Gulistan", "Shahbagh", "Farmgate", "IUBAT Campus"],
            "Bus_33_Physical": ["Physical", "Noorjahan Road", "Shia Masjid", "Shymoli", "Banani", "House Building", "IUBAT Campus"]
        };

        // ==============================================
        // 3. CORE INFRASTRUCTURE (FIREBASE & MAPS)
        // ==============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB7-YL-HoQA9uijTNFJawBUqZaxarfmRc4",
            databaseURL: "https://iubat-bus-tracker-58d7a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iubat-bus-tracker-58d7a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let uName = "", wakeLock = null, globalDbData = {}, targetAlarmStation = "", isAlarmTriggered = false;
        let map, markers = {};
        let wID = null, sLat = 0, sLng = 0;

        // --- GLOBAL INITIALIZATION FUNCTION (FIXED BUTTONS) ---
        function initApp(mode) {
            uName = document.getElementById('pName').value;
            if(!uName) return alert("Verification Failed: Enter Student ID or Name");
            
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            
            if (mode === 'broadcast') {
                document.getElementById('bPanel').style.display = 'block';
                document.getElementById('tPanel').style.display = 'none';
                document.getElementById('sys-status').innerText = "Mode: Probe (Broadcasting)";
            } else {
                document.getElementById('bPanel').style.display = 'none';
                document.getElementById('tPanel').style.display = 'block';
                document.getElementById('sys-status').innerText = "Mode: Detector (Tracking)";
            }
            // Give maps a moment to breath
            setTimeout(() => { loadMap(); }, 300);
        }

        // --- MAPPING ENGINE ---
        function loadMap() {
            if(map) return; // Prevent double init
            const uttaraBounds = L.latLngBounds([23.5, 90.1], [24.1, 90.6]);
            map = L.map('map', { zoomControl: false, maxBounds: uttaraBounds }).setView([23.8821, 90.3980], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            
            // Database Live Stream
            db.ref('active_buses').on('value', snap => {
                globalDbData = snap.val() || {};
                renderMarkers();
            });
        }

        function renderMarkers() {
            const filter = document.getElementById('fSelect').value;
            const now = Date.now();
            Object.keys(markers).forEach(id => map.removeLayer(markers[id]));
            markers = {};
            
            Object.keys(globalDbData).forEach(id => {
                const p = globalDbData[id];
                if (filter && p.bus !== filter) return;
                
                // Only show data from the last 2 hours
                if (now - p.ts < 7200000) {
                    markers[id] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`
                        <div style="text-align:center;">
                            <b style="color:var(--npf-action); font-size:14px;">${escapeHTML(p.bus.replace(/_/g, ' '))}</b><br>
                            <span style="font-size:11px;">Node: ${escapeHTML(p.name)}</span><br>
                            <span style="font-size:11px;">Stoppage: ${escapeHTML(p.station)}</span><br>
                            <b>${p.speed} KM/H</b> | ${p.alt}m<br>
                            <span style="color:#00ff88;">● Live Link Active</span>
                        </div>
                    `);
                }
            });
        }

        // --- TELEMETRY BROADCAST CORE ---
        async function toggleTelemetry() {
            const btn = document.getElementById('mBtn');
            const bus = document.getElementById('tSelect').value;
            if(!bus) return alert("System Error: Select Bus Route First");

            if(!wID) {
                // Engage Screen WakeLock
                try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch(e){}

                wID = navigator.geolocation.watchPosition(pos => {
                    const cLat = pos.coords.latitude, cLng = pos.coords.longitude;
                    
                    // ROUTE SENTINEL: 3KM RADIUS GEOFENCE
                    if (!verifyRouteProximity(cLat, cLng, bus)) {
                        alert("🚨 FALSE ALARM: Outside designated route. Broadcast terminated.");
                        db.ref('active_buses/' + uName).remove();
                        return toggleTelemetry();
                    }

                    checkGeofence(cLat, cLng);
                    
                    // High-Fidelity Signal Smoothing
                    const alpha = 0.3; if(sLat === 0) { sLat = cLat; sLng = cLng; }
                    sLat = (cLat * alpha) + (sLat * (1 - alpha)); 
                    sLng = (cLng * alpha) + (sLng * (1 - alpha));

                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    const alt = Math.round(pos.coords.altitude || 0);
                    const hdg = Math.round(pos.coords.heading || 0);

                    document.getElementById('live-kmh').innerText = speed + " KM/H";
                    document.getElementById('live-alt').innerText = alt;
                    document.getElementById('live-hdg').innerText = hdg;

                    db.ref('active_buses/' + uName).set({
                        name: uName, bus: bus, station: document.getElementById('tStation').value,
                        crowd: document.getElementById('tCrowd').value,
                        lat: sLat, lng: sLng, speed: speed, alt: alt, hdg: hdg, ts: Date.now()
                    });

                    btn.innerText = "HALT BROADCAST"; btn.classList.add('active');
                }, err => alert("🔴 GPS ERROR: " + err.message), 
                { enableHighAccuracy: true, timeout: 30000, maximumAge: 5000 });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                if(wakeLock) { wakeLock.release(); wakeLock = null; }
                btn.innerText = "INITIATE BROADCAST"; btn.classList.remove('active');
            }
        }

        // --- MATH & UTILITY ENGINE ---
        function getHaversine(l1, n1, l2, n2) {
            const R = 6371; const dL = (l2 - l1) * Math.PI / 180; const dN = (n2 - n1) * Math.PI / 180;
            const a = Math.sin(dL/2) * Math.sin(dL/2) + Math.cos(l1 * Math.PI / 180) * Math.cos(l2 * Math.PI / 180) * Math.sin(dN/2) * Math.sin(dN/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function verifyRouteProximity(lat, lng, busId) {
            const route = routeMatrix[busId] || ["IUBAT Campus"];
            let minD = Infinity;
            route.forEach(st => { if(stoppageCoords[st]) { let d = getHaversine(lat, lng, stoppageCoords[st].lat, stoppageCoords[st].lng); if(d < minD) minD = d; } });
            return minD <= 3.0;
        }

        function calculateETA() {
            let dest = document.getElementById("etaStation").value;
            if(!dest) return alert("Select Destination");
            document.getElementById('etaDisplay').innerText = Math.round((Math.random() * 15) + 5) + " MINS";
        }

        function activateRealSOS() {
            let plate = prompt("🚨 SOS GEO-BEACON 🚨\nEnter Plate Number or Student ID:");
            if(!plate) return;
            navigator.geolocation.getCurrentPosition(p => {
                let msg = `🚨 EMERGENCY! Assistance needed on IUBAT Bus (${plate}). Live Location: https://www.google.com/maps?q=$${p.coords.latitude},${p.coords.longitude}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            });
        }

        function escapeHTML(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&','<':'<','>':'>','"':'"','\'':''','}[m])); }
        function toggleETAOverlay(s) { document.getElementById('etaOverlay').style.display = s ? 'flex' : 'none'; }
        function setAlarm() { targetAlarmStation = document.getElementById("alarmSelect").value; isAlarmTriggered = false; }
        function applyFilter() { renderMarkers(); }

        function checkGeofence(lat, lng) {
            if (!targetAlarmStation || isAlarmTriggered) return;
            const target = stoppageCoords[targetAlarmStation];
            if (!target) return;
            const d = getHaversine(lat, lng, target.lat, target.lng);
            if (d <= 2.0) {
                isAlarmTriggered = true;
                if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000, 500, 2000]);
                alert(`⚠️ WAKE UP: Near ${targetAlarmStation}!`);
            }
        }

        // --- DROPDOWN POPULATOR ---
        function populateUI() {
            const fS = document.getElementById("fSelect"), tS = document.getElementById("tSelect"), aS = document.getElementById("alarmSelect"), eS = document.getElementById("etaStation");
            fS.innerHTML = '<option value="">-- SHOW ALL ACTIVE BUSES --</option>';
            tS.innerHTML = '<option value="">-- SELECT YOUR ROUTE --</option>';
            
            Object.keys(routeMatrix).forEach(bus => {
                let opt = document.createElement("option"); opt.value = bus; opt.text = bus.replace(/_/g, ' ');
                fS.appendChild(opt.cloneNode(true)); tS.appendChild(opt);
            });
            
            Object.keys(stoppageCoords).forEach(st => {
                let opt = document.createElement("option"); opt.value = st; opt.text = `🔔 Wake me at ${st}`;
                aS.appendChild(opt);
                let optE = document.createElement("option"); optE.value = st; optE.text = st;
                eS.appendChild(optE);
            });
        }

        function updateStationRoute() {
            const bus = document.getElementById("tSelect").value, select = document.getElementById("tStation");
            select.innerHTML = '<option value="Unknown">-- Stoppage Intelligence --</option>';
            select.disabled = !bus;
            if (bus) (routeMatrix[bus] || []).forEach(st => { let opt = document.createElement("option"); opt.value = st; opt.text = st; select.appendChild(opt); });
        }

        window.onload = populateUI;
    </script>
</body>
</html>
