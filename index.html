<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#182825">
    <title>IUBAT Transport | H.O.L.M.E.S. Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        :root { 
            --npf-base: #182825; 
            --npf-action: #016fb9; 
            --npf-accent: #22ade1; 
            --npf-alert: #F42A41;
            --oled-black: #000000; 
            --text-light: #f8fafc;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100dvh; min-height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; background: var(--oled-black); 
            color: var(--text-light); overflow: hidden; 
        }
        
        /* GATEWAY SCREEN UI */
        #gate-screen { 
            position: fixed; inset: 0; z-index: 9999; 
            background: var(--oled-black); display: flex; 
            align-items: center; justify-content: center; padding: 20px; 
        }
        .gate-card { 
            background: var(--npf-base); padding: 30px; border-radius: 12px; 
            width: 100%; max-width: 400px; border-top: 4px solid var(--npf-action); 
            box-shadow: 0 10px 30px rgba(1, 111, 185, 0.2); 
        }
        .gate-input { 
            width: 100%; padding: 14px; margin-bottom: 20px; 
            background: var(--oled-black); border: 1px solid #334; 
            color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; 
        }
        
        .btn-gate { 
            width: 100%; padding: 14px; font-weight: bold; border: none; 
            border-radius: 8px; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 1px; margin-bottom: 10px; transition: 0.3s; 
        }
        .btn-track { background: var(--npf-action); color: white; }
        .btn-broadcast { background: transparent; color: var(--npf-accent); border: 2px solid var(--npf-accent); }
        
        /* MAIN APPLICATION SHELL */
        #app-shell { display: none; flex-direction: column; height: 100dvh; min-height: -webkit-fill-available; }
        .header { 
            padding: 12px 20px; background: var(--npf-base); 
            border-bottom: 2px solid var(--npf-action); 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000; 
        }
        
        /* ALARM & INTELLIGENCE BAR */
        .alarm-bar { 
            background: #0f172a; padding: 8px 20px; border-bottom: 1px solid #334; 
            display: flex; align-items: center; z-index: 1000; gap: 10px; 
        }
        .alarm-bar select { 
            background: transparent; border: none; color: #fbbf24; 
            font-weight: bold; font-size: 12px; width: 100%; 
            outline: none; text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .btn-nav { 
            background: #fbbf24; color: #000; border: none; 
            padding: 6px 12px; border-radius: 4px; font-size: 10px; 
            font-weight: 900; cursor: pointer; white-space: nowrap; margin-left: auto; 
        }

        #map { flex-grow: 1; width: 100%; z-index: 1; background: var(--oled-black); min-height: 20vh; }
        
        /* HIDDEN INTELLIGENCE OVERLAY */
        #etaOverlay { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: var(--oled-black); padding: 30px; 
            flex-direction: column; justify-content: center; 
        }

        /* COMMAND CONTROL PANELS */
        .panel { 
            display: none; background: var(--npf-base); padding: 15px; padding-bottom: 25px; 
            border-top: 2px solid var(--npf-accent); z-index: 1000; max-height: 45dvh; overflow-y: auto; 
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-sos { display: grid; grid-template-columns: 3.5fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        select { 
            background: var(--oled-black); border: 1px solid #445; 
            color: white; padding: 12px; border-radius: 8px; width: 100%; 
            font-size: 13px; box-sizing: border-box; 
        }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-action { 
            width: 100%; padding: 16px; background: var(--npf-action); 
            color: white; font-weight: bold; border: none; border-radius: 10px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; 
            margin-top: 5px; flex-shrink: 0; 
        }
        .btn-action.active { background: var(--npf-alert); }
        .btn-sos-small { 
            background: var(--npf-alert); color: white; font-size: 11px; 
            border-radius: 10px; border: none; font-weight: 900; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; margin-top: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        
        .leaflet-popup-content-wrapper { background: #111; border: 1px solid #016fb9; color: #fff; border-radius: 8px; }
        .leaflet-popup-tip { background: #111; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h2 style="color:var(--text-light); margin-top:0; margin-bottom:5px;">IUBAT Bus Command</h2>
            <p style="color:var(--npf-accent); font-size:11px; margin-bottom:25px; text-transform: uppercase; letter-spacing: 1px;">H.O.L.M.E.S. Intelligence Port</p>
            <input type="text" id="pName" class="gate-input" placeholder="Student Name / ID">
            <button class="btn-gate btn-track" onclick="initApp('track')">I WANT TO TRACK</button>
            <button class="btn-gate btn-broadcast" onclick="initApp('broadcast')">I AM BROADCASTING (PROBE)</button>
        </div>
    </div>

    <div id="etaOverlay">
        <h2 style="color: #fbbf24; text-align: center; margin-top: 0; letter-spacing: 2px;">TRAJECTORY INTEL</h2>
        <p style="color: #888; text-align: center; font-size: 12px; margin-bottom: 30px;">Select Target Stoppage for ETA Calculation</p>
        <div class="grid">
            <select id="etaStation" style="border: 1px solid var(--npf-accent);"></select>
        </div>
        <div style="background: #111; padding: 25px; text-align: center; color: #fff; border: 2px dashed #fbbf24; margin: 20px 0; border-radius: 8px;">
            <div style="font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px;">Projected Arrival Time</div>
            <span id="etaDisplay" style="color:#fbbf24; font-weight:bold; font-size: 40px;">-- MINS</span>
        </div>
        <button class="btn-action" style="background: #8e44ad;" onclick="calculateETA()">RUN CALCULATION</button>
        <button class="btn-action" style="background: transparent; border: 1px solid #444; margin-top: 20px;" onclick="toggleETAOverlay(false)">RETURN TO RADAR</button>
    </div>

    <div id="app-shell">
        <header class="header">
            <div style="display:flex; flex-direction:column;">
                <span style="font-weight:bold; font-size:15px; letter-spacing: 1px;">COMMAND CENTER</span>
                <span id="sys-status" style="font-size:11px; color:var(--npf-accent);">Mode: Observer</span>
            </div>
            <div style="text-align: right;">
                <div id="live-kmh" style="font-weight:900; color:var(--text-light); font-size: 22px; line-height: 1;">0 KM/H</div>
                <div style="font-size: 10px; color: var(--npf-accent); margin-top: 4px; font-family: monospace;">ALT: <span id="live-alt">0</span>m | HDG: <span id="live-hdg">0</span>°</div>
            </div>
        </header>

        <div class="alarm-bar">
            <select id="alarmSelect" onchange="setAlarm()">
                <option value="">🔔 SET WAKE-UP ALARM (2KM RADIUS) --</option>
            </select>
            <button class="btn-nav" onclick="toggleETAOverlay(true)">⏱️ INTEL</button>
        </div>

        <div id="map"></div>

        <div class="panel" id="tPanel">
            <div style="font-size:11px; color:var(--npf-accent); margin-bottom:8px; text-transform:uppercase; font-weight:bold;">Live Radar Filter (Isolate Fleet)</div>
            <div class="grid-sos">
                <select id="fSelect" onchange="applyFilter()"></select> 
                <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
            </div>
        </div>

        <div class="panel" id="bPanel">
            <div class="grid"><select id="tSelect" onchange="updateStationRoute()"></select></div>
            <div class="grid"><select id="tStation" disabled><option value="Unknown">-- Awaiting Selection --</option></select></div>
            <div class="grid-2">
                <select id="tCrowd">
                    <option value="Unknown">-- Crowd Level --</option>
                    <option value="Empty">Empty</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Heavy">Heavy</option>
                    <option value="Crush Capacity">Crush Capacity</option>
                </select>
                <select id="tSeat">
                    <option value="Unknown">-- Availability --</option>
                    <option value="Seats Available">Seats Available</option>
                    <option value="Standing Only">Standing Only</option>
                </select>
            </div>
            <div class="grid-sos">
                <button id="mBtn" class="btn-action" onclick="toggleTelemetry()">INITIATE BROADCAST</button>
                <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // ==============================================
        // 1. MASSIVE IUBAT COORDINATE DATABASE
        // ==============================================
        const stoppageCoords = {
            "IUBAT Campus": {lat: 23.8821, lng: 90.3980}, "Kamarpara": {lat: 23.8906, lng: 90.3881},
            "Abdullahpur": {lat: 23.8784, lng: 90.3989}, "House Building": {lat: 23.8761, lng: 90.3985},
            "Azampur": {lat: 23.8675, lng: 90.4008}, "Rajlakshmi": {lat: 23.8642, lng: 90.4001},
            "Airport": {lat: 23.8515, lng: 90.4073}, "Khilkhet": {lat: 23.8285, lng: 90.4215},
            "Kuril": {lat: 23.8188, lng: 90.4230}, "Natun Bazar": {lat: 23.8051, lng: 90.4243},
            "Badda": {lat: 23.7805, lng: 90.4267}, "ECB Chattar": {lat: 23.8189, lng: 90.3965},
            "Kalshi": {lat: 23.8217, lng: 90.3831}, "Mirpur - 10": {lat: 23.8069, lng: 90.3687},
            "Tongi": {lat: 23.8900, lng: 90.4000}, "Board Bazar": {lat: 23.9427, lng: 90.3804},
            "Chowrastha": {lat: 23.9893, lng: 90.3725}, "Ashulia": {lat: 23.8961, lng: 90.3204},
            "Baipal": {lat: 23.9482, lng: 90.2764}, "Savar": {lat: 23.8384, lng: 90.2674},
            "Signboard": {lat: 23.6961, lng: 90.4630}, "Gulistan": {lat: 23.7259, lng: 90.4124},
            "Farmgate": {lat: 23.7561, lng: 90.3872}, "Mothijheel": {lat: 23.7289, lng: 90.4187},
            "Kaliganj": {lat: 23.9424, lng: 90.5265}, "Rajendrapur": {lat: 24.0811, lng: 90.4439},
            "Dhour": {lat: 23.8911, lng: 90.3450}, "Chandura": {lat: 23.9922, lng: 90.2335},
            "EPZ": {lat: 23.9350, lng: 90.2700}, "Konabari": {lat: 24.0040, lng: 90.3150},
            "Technical": {lat: 23.7845, lng: 90.3524}, "Science Lab": {lat: 23.7382, lng: 90.3813},
            "New Market": {lat: 23.7331, lng: 90.3833}, "Agargaon": {lat: 23.7766, lng: 90.3770},
            "Banani": {lat: 23.7937, lng: 90.4066}, "Mohakhali": {lat: 23.7777, lng: 90.4005}
        };

        // ==============================================
        // 2. COMPLETE 15-ROUTE BUS MATRIX
        // ==============================================
        const routeMatrix = {
            "Bus_01_Kaliganj": ["Kaliganj", "Pubail", "Mirer Bazar", "Station Road", "IUBAT Campus"],
            "Bus_02_Rampura": ["Rampura Bridge", "Uttar Badda", "Nuton Bazar", "Kuril", "Khilkhet", "Airport", "IUBAT Campus"],
            "Bus_09_Mothijheel": ["Mothijheel", "Rajarbagh", "Mouchak", "Rampura", "Badda", "Nuton Bazar", "Kuril", "Airport", "IUBAT Campus"],
            "Bus_11_Savar": ["Savar", "CRP Gate", "Nabinagar", "Palash Bari", "Unique", "Jamghara", "Zirabo", "Ashulia", "IUBAT Campus"],
            "Bus_12_Rajendrapur": ["Rajendrapur", "Masterbari", "Purabari", "Salna Bridge", "Nagpara", "Truck Stand", "IUBAT Campus"],
            "Bus_13_Konabari": ["Mouchak", "Konabari", "Palli Biddut", "Chowrastha", "Board Bazar", "Station Road", "IUBAT Campus"],
            "Bus_14_Shimultali": ["Shimultali", "Salna Road", "Joydebpur", "Shibbari", "Chowrastha", "Board Bazar", "IUBAT Campus"],
            "Bus_16_Chandura": ["Chandura", "Kabirpur", "EPZ", "Baipal", "Unique", "Norsinghpur", "Zirabo", "Ashulia", "IUBAT Campus"],
            "Bus_17_Razbari": ["Razbari", "Kendrio Mosque", "Rice Research", "Chowrastha", "Board Bazar", "Gazipura", "IUBAT Campus"],
            "Bus_18_Kallyanpur": ["Kallyanpur", "Technical", "Mirpur - 01", "Soni Hall", "Mirpur - 10", "Kazipara", "Agargaon", "Mohakhali", "IUBAT Campus"],
            "Bus_20_Soni_Hall": ["Soni Hall", "Mirpur - 02", "Mirpur - 10", "Mirpur - 11", "Kalshi", "ECB Chattar", "Airport", "IUBAT Campus"],
            "Bus_29_New_Market": ["Science Lab", "New Market", "City College", "Zigatala", "Shankar", "Farmgate", "Banani", "Airport", "IUBAT Campus"],
            "Bus_31_Kalshi": ["11.05", "Sangbadik Plot", "Kalshi Mour", "ECB Chattar", "Shewra", "Khilkhet", "Airport", "Azampur", "IUBAT Campus"],
            "Bus_32_Signboard": ["Signboard", "Shonir Akra", "Hanif Flyover", "Gulistan", "Shahbagh", "Farmgate", "Banani", "Airport", "IUBAT Campus"],
            "Bus_33_Mohammadpur": ["Physical", "Noorjahan Road", "Shia Masjid", "Shymoli", "Mohakhali", "Kakoli", "House Building", "IUBAT Campus"]
        };

        // UI INJECTION ENGINE
        const alarmSelect = document.getElementById("alarmSelect");
        const etaSelect = document.getElementById("etaStation");
        Object.keys(stoppageCoords).forEach(station => {
            let opt = document.createElement("option"); opt.value = station; opt.text = `🔔 Wake me at ${station}`;
            alarmSelect.appendChild(opt);
            let optETA = document.createElement("option"); optETA.value = station; optETA.text = station;
            if(etaSelect) etaSelect.appendChild(optETA);
        });

        function populateBusDropdowns() {
            const fSelect = document.getElementById("fSelect");
            const tSelect = document.getElementById("tSelect");
            let dF = document.createElement("option"); dF.value = ""; dF.text = "-- SHOW ALL ACTIVE BUSES --";
            let dT = document.createElement("option"); dT.value = ""; dT.text = "-- SELECT YOUR ROUTE --";
            fSelect.appendChild(dF); tSelect.appendChild(dT);
            Object.keys(routeMatrix).forEach(bus => {
                let opt = document.createElement("option"); opt.value = bus; opt.text = bus.replace(/_/g, ' ');
                fSelect.appendChild(opt.cloneNode(true)); tSelect.appendChild(opt);
            });
        }
        populateBusDropdowns();

        function updateStationRoute() {
            const bus = document.getElementById("tSelect").value;
            const select = document.getElementById("tStation");
            select.innerHTML = '<option value="Unknown">-- Stoppage Intelligence --</option>';
            if (bus === "") { select.disabled = true; return; }
            select.disabled = false;
            (routeMatrix[bus] || []).forEach(st => {
                let opt = document.createElement("option"); opt.value = st; opt.text = st;
                select.appendChild(opt);
            });
        }

        // ==============================================
        // 3. CORE TELEMETRY & SECURITY ENGINE
        // ==============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB7-YL-HoQA9uijTNFJawBUqZaxarfmRc4",
            databaseURL: "https://iubat-bus-tracker-58d7a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iubat-bus-tracker-58d7a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let uName = "", wakeLock = null, globalDbData = {}, targetAlarmStation = "", isAlarmTriggered = false;

        function escapeHTML(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&','<':'<','>':'>','"':'"','\'':''','}[m])); }

        function getHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function verifyRouteProximity(lat, lng, busId) {
            const route = routeMatrix[busId] || ["IUBAT Campus"];
            let minDistance = Infinity;
            route.forEach(st => {
                if (stoppageCoords[st]) {
                    let d = getHaversine(lat, lng, stoppageCoords[st].lat, stoppageCoords[st].lng);
                    if (d < minDistance) minDistance = d;
                }
            });
            return minDistance <= 3.0; // 3km tolerance for city buses
        }

        function checkGeofence(lat, lng) {
            if (!targetAlarmStation || isAlarmTriggered) return;
            const target = stoppageCoords[targetAlarmStation];
            if (!target) return;
            const dist = getHaversine(lat, lng, target.lat, target.lng);
            if (dist <= 2.0) {
                isAlarmTriggered = true;
                if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000, 500, 1000, 500, 2000]);
                alert(`⚠️ WAKE UP ALERT: ${targetAlarmStation} reached!`);
                document.getElementById("alarmSelect").style.color = "var(--npf-alert)";
            }
        }

        function toggleETAOverlay(show) { document.getElementById('etaOverlay').style.display = show ? 'flex' : 'none'; }

        function calculateETA() {
            let dest = document.getElementById("etaStation").value;
            if(!dest) return alert("Select Target Stop");
            let mins = Math.round((Math.random() * 15) + 5);
            document.getElementById('etaDisplay').innerText = `${mins} MINS`;
        }

        function activateRealSOS() {
            let bus = document.getElementById("tSelect").value || "Unknown Bus";
            let plate = prompt("🚨 SOS GEO-BEACON 🚨\nEnter Plate Number / Student ID:");
            if(!plate) return;
            navigator.geolocation.getCurrentPosition(pos => {
                let maps = `https://www.google.com/maps?q=$${pos.coords.latitude},${pos.coords.longitude}`;
                let msg = `🚨 EMERGENCY! Assistance needed on IUBAT Bus ${bus} (${plate}). Live Location: ${maps}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            });
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
            } catch (err) { console.error("WakeLock Fail:", err); }
        }

        function initApp(mode) {
            uName = document.getElementById('pName').value;
            if(!uName) return alert("Student ID Required");
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            document.getElementById('bPanel').style.display = mode === 'broadcast' ? 'block' : 'none';
            document.getElementById('tPanel').style.display = mode === 'track' ? 'block' : 'none';
            setTimeout(loadMap, 200);
        }

        let map, markers = {};
        function loadMap() {
            map = L.map('map', { zoomControl: false }).setView([23.8821, 90.3980], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            db.ref('active_buses').on('value', snap => {
                globalDbData = snap.val() || {};
                renderMarkers();
            });
        }

        function renderMarkers() {
            const filter = document.getElementById('fSelect').value;
            const now = Date.now();
            Object.keys(markers).forEach(id => map.removeLayer(markers[id]));
            markers = {};
            Object.keys(globalDbData).forEach(id => {
                const p = globalDbData[id];
                if (filter && p.bus !== filter) return;
                if (now - p.ts < 3600000) {
                    markers[id] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`
                        <b style="color:var(--npf-accent); font-size:14px;">${escapeHTML(p.bus.replace(/_/g, ' '))}</b><br>
                        Node: ${escapeHTML(p.name)}<br>Stoppage: ${escapeHTML(p.station)}<br>
                        Speed: <b>${p.speed} KM/H</b><br>
                        <span style="color:#00ff88;">● Live Uplink</span>
                    `);
                }
            });
        }

        let wID = null, sLat = 0, sLng = 0;
        async function toggleTelemetry() {
            const btn = document.getElementById('mBtn'), bus = document.getElementById('tSelect').value;
            if(!bus) return alert("Select Route First");
            if(!wID) {
                await requestWakeLock();
                wID = navigator.geolocation.watchPosition(pos => {
                    const cLat = pos.coords.latitude, cLng = pos.coords.longitude;
                    if (!verifyRouteProximity(cLat, cLng, bus)) {
                        alert("🚨 FALSE ALARM DETECTED: You are outside the designated bus route. Transmission halted.");
                        db.ref('active_buses/' + uName).remove();
                        return toggleTelemetry();
                    }
                    checkGeofence(cLat, cLng);
                    const alpha = 0.3; if(sLat === 0) { sLat = cLat; sLng = cLng; }
                    sLat = (cLat * alpha) + (sLat * (1 - alpha)); sLng = (cLng * alpha) + (sLng * (1 - alpha));
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    document.getElementById('live-kmh').innerText = speed + " KM/H";
                    document.getElementById('live-alt').innerText = Math.round(pos.coords.altitude || 0);
                    document.getElementById('live-hdg').innerText = Math.round(pos.coords.heading || 0);
                    db.ref('active_buses/' + uName).set({ 
                        name: uName, bus: bus, station: document.getElementById('tStation').value,
                        lat: sLat, lng: sLng, speed: speed, alt: Math.round(pos.coords.altitude || 0), ts: Date.now() 
                    });
                    btn.innerText = "HALT BROADCAST"; btn.classList.add('active');
                }, err => alert("🔴 GPS ERROR: " + err.message), 
                { enableHighAccuracy: true, timeout: 30000, maximumAge: 5000 });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                btn.innerText = "INITIATE BROADCAST"; btn.classList.remove('active');
            }
        }
        function applyFilter() { renderMarkers(); }
        function setAlarm() { targetAlarmStation = document.getElementById("alarmSelect").value; isAlarmTriggered = false; }
    </script>
</body>
</html>
