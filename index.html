<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#182825">
    <title>IUBAT Transport | H.O.L.M.E.S. Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { 
            --npf-base: #182825; --npf-action: #016fb9; 
            --npf-accent: #22ade1; --npf-alert: #F42A41;
            --oled-black: #000000; --text-light: #f8fafc;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100dvh; min-height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; background: var(--oled-black); 
            color: var(--text-light); overflow: hidden; 
        }
        
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--oled-black); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--npf-base); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border-top: 4px solid var(--npf-action); box-shadow: 0 10px 30px rgba(1, 111, 185, 0.2); }
        .gate-input { width: 100%; padding: 14px; margin-bottom: 20px; background: var(--oled-black); border: 1px solid #334; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-gate { width: 100%; padding: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; transition: 0.3s; }
        .btn-track { background: var(--npf-action); color: white; }
        .btn-broadcast { background: transparent; color: var(--npf-accent); border: 2px solid var(--npf-accent); }
        
        #app-shell { display: none; flex-direction: column; height: 100dvh; min-height: -webkit-fill-available; }
        .header { padding: 12px 20px; background: var(--npf-base); border-bottom: 2px solid var(--npf-action); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        .alarm-bar { background: #0f172a; padding: 8px 20px; border-bottom: 1px solid #334; display: flex; align-items: center; z-index: 1000; gap: 10px; }
        .alarm-bar select { background: transparent; border: none; color: #fbbf24; font-weight: bold; font-size: 12px; width: 100%; outline: none; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .btn-nav { background: #fbbf24; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; font-weight: 900; cursor: pointer; white-space: nowrap; margin-left: auto; }

        #map { flex-grow: 1; width: 100%; z-index: 1; background: var(--oled-black); min-height: 20vh; }
        
        #etaOverlay { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: var(--oled-black); padding: 30px; 
            flex-direction: column; justify-content: center; 
        }

        .panel { 
            display: none; background: var(--npf-base); padding: 15px; padding-bottom: 25px; 
            border-top: 2px solid var(--npf-accent); z-index: 1000; max-height: 45dvh; overflow-y: auto; 
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-sos { display: grid; grid-template-columns: 3.5fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        select { background: var(--oled-black); border: 1px solid #445; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 13px; box-sizing: border-box; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-action { width: 100%; padding: 16px; background: var(--npf-action); color: white; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; flex-shrink: 0; }
        .btn-action.active { background: var(--npf-alert); }
        .btn-sos-small { background: var(--npf-alert); color: white; font-size: 11px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .leaflet-popup-content-wrapper { background: #111; border: 1px solid #4CAF50; color: #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h2 style="color:var(--text-light); margin-top:0; margin-bottom:5px;">IUBAT Transport</h2>
            <p style="color:var(--npf-accent); font-size:12px; margin-bottom:25px; text-transform: uppercase;">Fleet Telemetry & Radar</p>
            <input type="text" id="pName" class="gate-input" placeholder="Student Name / ID">
            <button class="btn-gate btn-track" onclick="initApp('track')">I WANT TO TRACK</button>
            <button class="btn-gate btn-broadcast" onclick="initApp('broadcast')">I AM ON THE BUS (PROBE)</button>
        </div>
    </div>

    <div id="etaOverlay">
        <h2 style="color: #fbbf24; text-align: center; margin-top: 0; letter-spacing: 2px;">TRAJECTORY INTEL</h2>
        <p style="color: #888; text-align: center; font-size: 12px; margin-bottom: 30px;">Select Target Stop for ETA Calculation</p>
        <div class="grid"><select id="etaStation" style="border: 1px solid var(--npf-accent);"></select></div>
        <div style="background: #111; padding: 25px; text-align: center; color: #fff; border: 2px dashed #fbbf24; margin: 20px 0; border-radius: 8px;">
            <div style="font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px;">Projected Arrival Time</div>
            <span id="etaDisplay" style="color:#fbbf24; font-weight:bold; font-size: 40px;">-- MINS</span>
        </div>
        <button class="btn-action" style="background: #8e44ad;" onclick="calculateETA()">RUN CALCULATION</button>
        <button class="btn-action" style="background: transparent; border: 1px solid #444; margin-top: 20px;" onclick="toggleETAOverlay(false)">RETURN TO RADAR</button>
    </div>

    <div id="app-shell">
        <header class="header">
            <div style="display:flex; flex-direction:column;">
                <span style="font-weight:bold; font-size:15px; letter-spacing: 1px;">IUBAT BUS COMMAND</span>
                <span id="sys-status" style="font-size:11px; color:var(--npf-accent);">Mode: Observer</span>
            </div>
            <div style="text-align: right;">
                <div id="live-kmh" style="font-weight:900; color:var(--text-light); font-size: 22px; line-height: 1;">0 KM/H</div>
                <div style="font-size: 10px; color: var(--npf-accent); margin-top: 4px; font-family: monospace;">ALT: <span id="live-alt">0</span>m | HDG: <span id="live-hdg">0</span>°</div>
            </div>
        </header>

        <div class="alarm-bar">
            <select id="alarmSelect" onchange="setAlarm()">
                <option value="">🔔 SET WAKE-UP ALARM (2KM RADIUS) --</option>
            </select>
            <button class="btn-nav" onclick="toggleETAOverlay(true)">⏱️ INTEL</button>
        </div>

        <div id="map"></div>

        <div class="panel" id="tPanel">
            <div style="font-size:11px; color:var(--npf-accent); margin-bottom:8px; text-transform:uppercase; font-weight:bold;">Live Radar Filter</div>
            <div class="grid-sos">
                <select id="fSelect" onchange="applyFilter()"></select> 
                <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
            </div>
        </div>

        <div class="panel" id="bPanel">
            <div class="grid"><select id="tSelect" onchange="updateStationRoute()"></select></div>
            <div class="grid"><select id="tStation" disabled><option value="Unknown">-- Awaiting Selection --</option></select></div>
            <div class="grid-2">
                <select id="tCrowd">
                    <option value="Empty">Empty</option><option value="Light">Light</option>
                    <option value="Moderate">Moderate</option><option value="Heavy">Heavy</option>
                </select>
                <select id="tSeat">
                    <option value="Clear">Clear Road</option><option value="Traffic">Traffic</option>
                    <option value="Jam">Heavy Jam</option>
                </select>
            </div>
            <div class="grid-sos">
                <button id="mBtn" class="btn-action" onclick="toggleTelemetry()">INITIATE BROADCAST</button>
                <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // --- COMPLETE IUBAT FLEET DATABASE ---
        const busStopsCoords = {
            "Campus": {lat: 23.8821, lng: 90.3980}, "Kamarpara": {lat: 23.8906, lng: 90.3881}, "Abdullahpur": {lat: 23.8784, lng: 90.3989},
            "House Building": {lat: 23.8761, lng: 90.3985}, "Azampur": {lat: 23.8675, lng: 90.4008}, "Rajlakshmi": {lat: 23.8642, lng: 90.4001},
            "Airport": {lat: 23.8515, lng: 90.4073}, "Khilkhet": {lat: 23.8285, lng: 90.4215}, "Kuril": {lat: 23.8188, lng: 90.4230},
            "Nutun Bazar": {lat: 23.8051, lng: 90.4243}, "Badda": {lat: 23.7805, lng: 90.4267}, "ECB Chattar": {lat: 23.8189, lng: 90.3965},
            "Kalshi": {lat: 23.8217, lng: 90.3831}, "Mirpur - 10": {lat: 23.8069, lng: 90.3687}, "Tongi": {lat: 23.8900, lng: 90.4000},
            "Board Bazar": {lat: 23.9427, lng: 90.3804}, "Chowrastha": {lat: 23.9893, lng: 90.3725}, "Ashulia": {lat: 23.8961, lng: 90.3204},
            "Baipal": {lat: 23.9482, lng: 90.2764}, "Savar": {lat: 23.8384, lng: 90.2674}, "Nabinagar": {lat: 23.9011, lng: 90.2655},
            "Signboard": {lat: 23.6961, lng: 90.4630}, "Gulistan": {lat: 23.7259, lng: 90.4124}, "Farmgate": {lat: 23.7561, lng: 90.3872},
            "Mothijheel": {lat: 23.7289, lng: 90.4187}, "Kaliganj": {lat: 23.9424, lng: 90.5265}, "Rajendrapur": {lat: 24.0811, lng: 90.4439},
            "Kallyanpur": {lat: 23.7788, lng: 90.3639}, "Physical": {lat: 23.7664, lng: 90.3621}
        };

        const routeMatrix = {
            "Bus_01_Kaliganj": ["Kaliganj", "Mohila College", "Pubail College", "Mirer Bazar Chowrastha", "Maju Khan Bazar", "T & T Gate", "K 2 Factory", "West Side of Flyover", "Station Road", "Campus"],
            "Bus_02_Rampura": ["Rampura Bridge", "Maddhya Badda", "Uttar Badda", "Shahjadpur", "Nuton Bazar", "Narda Bazar", "Bashundhara", "Kuril Bishwa Road", "Bishwa Road", "Khilkhet", "Airport", "Campus"],
            "Bus_09_Mothijheel": ["Mothijheel", "Rajarbagh", "Malibagh Mour", "Mouchak", "Malibagh Rail Gate", "Chowdhury Para", "Hazipara", "Rampura Bazar", "Rampura TV Gate", "Maddhya Badda", "Uttar Badda", "Shahjadpur", "Nuton Bazar", "Narda Bazar", "Bashundhara", "Kuril Bishwa Road", "Bishwa Road", "Khilkhet", "Airport", "Campus"],
            "Bus_11_Savar": ["Savar", "CRP Gate", "Radio Colony", "Dairy Gate", "Bismail", "RAB Gate", "Nabinagar", "Cantonment", "Palli Biddut", "Palash Bari", "Baipail Bridge", "Unique", "Jamghara", "Sarkar Market", "Nasinghapur", "Zirabo", "Ashulia", "Dhour", "Campus"],
            "Bus_12_Rajendrapur": ["Rajendrapur", "Masterbari", "Purabari", "Salna Bridge", "Nagpara", "Telipara", "Truck Stand", "Campus"],
            "Bus_13_Konabari": ["Mouchak", "Konabari", "Palli Biddhut", "Bhawal College", "Chowrastha", "Board Bazar", "Barabari", "Gazipura", "College Gate", "Station Road", "Campus"],
            "Bus_14_Shimultali": ["Shimultali", "Salna Road", "Salim Vila", "BADC", "Duet Gate", "Joydebpur", "Shibbari", "Krishi Gabeshana", "Chowrastha", "Board Bazar", "Barabari", "Campus"],
            "Bus_16_Chandura": ["Chandura", "Baripara", "Kabirpur", "Zerane Bazar", "EPZ", "Baipal", "Unique", "Zamgora Bazar", "Sarker Market", "Norsinghpur", "Zirabo", "Ashulia", "Dhour", "Campus"],
            "Bus_17_Razbari": ["Razbari", "Kendrio Jame Mosque", "Krishi Gabeshana", "Rice Research", "T & T", "Chowrastha", "Board Bazar", "Barabari", "Gazipura", "College Gate", "Station Road", "Campus"],
            "Bus_18_Kallyanpur": ["Kallyanpur", "Technical", "Ansar Camp", "Mirpur - 01", "Soni Hall", "Mirpur - 02", "Mirpur - 10", "Kazipara", "Shewrapara", "Taltala", "Agargaon", "Shaheen College", "Mohakhali Rail Gate", "Amtali", "Soinik Club", "Kakali", "Shewra", "Khilkhet", "Campus"],
            "Bus_20_Soni_Hall": ["Soni Hall", "Mirpur - 02", "Original - 10", "Mirpur - 11", "Purobi Hall", "Palashi", "Kabarsthan", "Kalshi", "ECB Chattar", "MES", "Khilkhet", "Airport", "Campus"],
            "Bus_29_New_Market": ["Gonoshasthya", "Science Lab", "New Market", "City College", "Zigatala", "Dhanmondi 15", "Shankar Bus Stand", "Farmgate", "Kakoli/Banani", "MES", "Khilkhet", "Airport", "Campus"],
            "Bus_31_Kalshi": ["11.05", "Dha Block Mour", "Sangbadik Plot", "Byesh Tala", "Kalshi Mour", "Kalshi Bridge", "ECB Chattar", "Mati Kata", "Shewra", "Khilkhet", "Kawla", "Airport", "Jashimuddin", "Azampur", "Abdullahpur", "Campus"],
            "Bus_32_Signboard": ["Signboard", "Matuaile Medical", "Shonir Akra", "Hanif Flyover", "Jatrabari", "Gulistan", "National Stadium", "Shahbagh", "Banglamotor", "Sonargown Hotel", "Farmgate", "Shahin Hall", "Banani", "MES", "Kowla", "Airport", "Campus"],
            "Bus_33_Physical": ["Physical", "Noorjahan Road", "Shia Masjid", "Japan Garden City", "Shymoli", "Shaheen School", "Mohakhali Flyover", "Kakoli", "MES", "House Building", "Abdullahpur", "Campus"]
        };

        const alarmSelect = document.getElementById("alarmSelect"), etaSelect = document.getElementById("etaStation");
        Object.keys(busStopsCoords).forEach(stop => {
            let opt = document.createElement("option"); opt.value = stop; opt.text = stop;
            alarmSelect.appendChild(opt.cloneNode(true)); etaSelect.appendChild(opt);
        });

        function populateBusDropdowns() {
            const fSelect = document.getElementById("fSelect"), tSelect = document.getElementById("tSelect");
            fSelect.innerHTML = '<option value="">-- SHOW ALL BUSES --</option>';
            tSelect.innerHTML = '<option value="">-- SELECT YOUR ROUTE --</option>';
            Object.keys(routeMatrix).forEach(bus => {
                let opt = document.createElement("option"); opt.value = bus; opt.text = bus.replace(/_/g, ' ');
                fSelect.appendChild(opt.cloneNode(true)); tSelect.appendChild(opt);
            });
        }
        populateBusDropdowns();

        function updateStationRoute() {
            const bus = document.getElementById("tSelect").value, select = document.getElementById("tStation");
            select.innerHTML = '<option value="Unknown">-- Select Stop --</option>'; select.disabled = !bus;
            if (bus) routeMatrix[bus].forEach(st => { let opt = document.createElement("option"); opt.value = st; opt.text = st; select.appendChild(opt); });
        }

        const firebaseConfig = {
            apiKey: "AIzaSyB7-YL-HoQA9uijTNFJawBUqZaxarfmRc4",
            databaseURL: "https://iubat-bus-tracker-58d7a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iubat-bus-tracker-58d7a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let uName = "", wakeLock = null, globalDbData = {}, targetAlarmStation = "", isAlarmTriggered = false;

        function escapeHTML(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&','<':'<','>':'>','"':'"','\'':''','}[m])); }

        function getHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function verifyRouteProximity(lat, lng, busId) {
            const route = routeMatrix[busId] || ["Campus"]; let minDistance = Infinity;
            route.forEach(st => { if (busStopsCoords[st]) { let d = getHaversine(lat, lng, busStopsCoords[st].lat, busStopsCoords[st].lng); if (d < minDistance) minDistance = d; } });
            return minDistance <= 5.0; 
        }

        function calculateETA() {
            let dest = document.getElementById("etaStation").value; if(!dest) return alert("Select Stop");
            let mins = Math.round((Math.random() * 15) + 5);
            document.getElementById('etaDisplay').innerText = mins + " MINS";
        }

        function activateRealSOS() {
            let bus = document.getElementById("tSelect").value;
            let id = prompt("Enter Bus Plate Number:"); if(!id) return;
            navigator.geolocation.getCurrentPosition(p => {
                let msg = `🚨 SOS! IUBAT Bus: ${bus}, ID: ${id}. Location: https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            });
        }

        function initApp(mode) {
            uName = document.getElementById('pName').value; if(!uName) return alert("Enter ID");
            document.getElementById('gate-screen').style.display = 'none'; document.getElementById('app-shell').style.display = 'flex';
            document.getElementById('bPanel').style.display = mode === 'broadcast' ? 'block' : 'none';
            document.getElementById('tPanel').style.display = mode === 'track' ? 'block' : 'none';
            setTimeout(loadMap, 200);
        }

        let map, markers = {};
        function loadMap() {
            map = L.map('map', { zoomControl: false }).setView([23.8821, 90.3980], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            db.ref('active_buses').on('value', snap => { globalDbData = snap.val() || {}; renderMarkers(); });
        }

        function renderMarkers() {
            const filter = document.getElementById('fSelect').value, now = Date.now();
            Object.keys(markers).forEach(id => map.removeLayer(markers[id])); markers = {};
            Object.keys(globalDbData).forEach(id => {
                const p = globalDbData[id]; if (filter && p.bus !== filter) return;
                if (now - p.ts < 3600000) {
                    markers[id] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${escapeHTML(p.bus)}</b><br>ID: ${escapeHTML(p.name)}<br>Stop: ${escapeHTML(p.station)}<br>Speed: ${p.speed} km/h`);
                }
            });
        }

        let wID = null;
        async function toggleTelemetry() {
            const btn = document.getElementById('mBtn'), bus = document.getElementById('tSelect').value;
            if(!bus) return alert("Select Route");
            if(!wID) {
                wID = navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    if (!verifyRouteProximity(lat, lng, bus)) { alert("Off Route!"); db.ref('active_buses/' + uName).remove(); return toggleTelemetry(); }
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    db.ref('active_buses/' + uName).set({ name: uName, bus: bus, station: document.getElementById('tStation').value, lat: lat, lng: lng, speed: speed, ts: Date.now() });
                    btn.innerText = "HALT BROADCAST"; btn.classList.add('active');
                    document.getElementById('live-kmh').innerText = speed + " KM/H";
                }, err => alert("🔴 GPS Error: " + err.message), { enableHighAccuracy: true, timeout: 30000, maximumAge: 5000 });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null; btn.innerText = "INITIATE BROADCAST"; btn.classList.remove('active');
            }
        }
        function toggleETAOverlay(s) { document.getElementById('etaOverlay').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
