<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#182825">
<title>IUBAT Bus Radar | H.O.L.M.E.S. Command Center</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

<style>
/* === Root Variables === */
:root {
    --base: #182825;
    --accent: #4CAF50;
    --highlight: #81C784;
    --alert: #F42A41;
    --oled-black: #000;
    --text-light: #f8fafc;
}

/* === Body & Layout === */
body, html {
    margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--oled-black); color: var(--text-light);
    overflow: hidden;
}

#gate-screen {
    position: fixed; inset:0; display:flex; align-items:center; justify-content:center; background: var(--oled-black); z-index:9999;
}
.gate-card {
    background: var(--base); padding: 30px; border-radius: 12px; width:100%; max-width:400px;
    border-top: 4px solid var(--accent); box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
    text-align:center;
}
.gate-input { width:100%; padding:14px; margin-bottom:20px; border-radius:8px; border:1px solid #334; background: var(--oled-black); color:white; }
.btn-gate { width:100%; padding:14px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; margin-bottom:10px; text-transform:uppercase; }
.btn-track { background: var(--accent); color:white; }
.btn-broadcast { background: transparent; color: var(--highlight); border: 2px solid var(--highlight); }

/* === Map & Panels === */
#map { flex-grow:1; width:100%; background: var(--oled-black); }
.panel { display:none; background: var(--base); padding:15px; border-top:2px solid var(--highlight); max-height:45vh; overflow-y:auto; }
.grid { display:grid; gap:10px; margin-bottom:10px; }
.grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px; }
.grid-sos { display:grid; grid-template-columns: 3.5fr 1fr; gap:10px; margin-bottom:10px; }
select { background: var(--oled-black); border:1px solid #445; color:white; padding:12px; border-radius:8px; width:100%; }
select:disabled { opacity:0.5; cursor:not-allowed; }
.btn-action { width:100%; padding:16px; border:none; border-radius:10px; background: var(--accent); color:white; font-weight:bold; cursor:pointer; margin-top:5px; text-transform:uppercase; }
.btn-action.active { background: var(--alert); }
.btn-sos-small { background: var(--alert); color:white; font-size:11px; border-radius:10px; border:none; font-weight:900; cursor:pointer; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 6px rgba(0,0,0,0.3); }

.header { padding:12px 20px; background: var(--base); border-bottom:2px solid var(--accent); display:flex; justify-content:space-between; align-items:center; }
.alarm-bar { background:#0f172a; padding:8px 20px; border-bottom:1px solid #334; display:flex; gap:10px; align-items:center; }
.btn-nav { background:#fbbf24; color:#000; border:none; padding:6px 12px; border-radius:4px; font-size:10px; font-weight:900; cursor:pointer; margin-left:auto; }

#etaOverlay { display:none; position:fixed; inset:0; z-index:2000; background: var(--oled-black); padding:30px; flex-direction:column; justify-content:center; }
</style>
</head>
<body>

<div id="gate-screen">
    <div class="gate-card">
        <h2>IUBAT Transport</h2>
        <p style="color: var(--highlight); font-size:12px; text-transform:uppercase; margin-bottom:25px;">Fleet Telemetry & Radar</p>
        <input type="text" id="pName" class="gate-input" placeholder="Student Name / ID">
        <button class="btn-gate btn-track" onclick="initApp('track')">I WANT TO TRACK</button>
        <button class="btn-gate btn-broadcast" onclick="initApp('broadcast')">I AM ON THE BUS (PROBE)</button>
    </div>
</div>

<div id="etaOverlay">
    <h2 style="color: #fbbf24; text-align: center;">TRAJECTORY INTEL</h2>
    <p style="color: #888; text-align:center; font-size:12px; margin-bottom:30px;">Select Target Bus Stop for ETA Calculation</p>
    <div class="grid">
        <select id="etaStation"></select>
    </div>
    <div style="background:#111; padding:25px; text-align:center; color:#fff; border:2px dashed #fbbf24; border-radius:8px; margin:20px 0;">
        <div style="font-size:11px; color:#888; text-transform:uppercase; margin-bottom:10px;">Projected Arrival Time</div>
        <span id="etaDisplay" style="color:#fbbf24; font-weight:bold; font-size:40px;">-- MINS</span>
    </div>
    <button class="btn-action" style="background:#8e44ad;" onclick="calculateETA()">RUN CALCULATION</button>
    <button class="btn-action" style="background:transparent; border:1px solid #444; margin-top:20px;" onclick="toggleETAOverlay(false)">RETURN TO RADAR</button>
</div>

<div id="app-shell" style="display:none; flex-direction:column; height:100vh;">
    <header class="header">
        <div style="display:flex; flex-direction:column;">
            <span style="font-weight:bold; font-size:15px; letter-spacing:1px;">IUBAT BUS COMMAND</span>
            <span id="sys-status" style="font-size:11px; color:var(--highlight);">Mode: Observer</span>
        </div>
        <div style="text-align:right;">
            <div id="live-kmh" style="font-weight:900; color:var(--text-light); font-size:22px;">0 KM/H</div>
            <div style="font-size:10px; color:var(--highlight); margin-top:4px; font-family:monospace;">ALT: <span id="live-alt">0</span>m | HDG: <span id="live-hdg">0</span>°</div>
        </div>
    </header>

    <div class="alarm-bar">
        <select id="alarmSelect" onchange="setAlarm()">
            <option value="">🔔 SET WAKE-UP ALARM (2KM RADIUS) --</option>
        </select>
        <button class="btn-nav" onclick="toggleETAOverlay(true)">⏱️ INTEL</button>
    </div>

    <div id="map"></div>

    <div class="panel" id="tPanel">
        <div style="font-size:11px; color:var(--highlight); margin-bottom:8px; text-transform:uppercase; font-weight:bold;">Live Radar Filter (Isolate Bus)</div>
        <div class="grid-sos">
            <select id="fSelect" onchange="applyFilter()"></select>
            <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
        </div>
    </div>

    <div class="panel" id="bPanel">
        <div class="grid">
            <select id="tSelect" onchange="updateStationRoute()"></select>
        </div>
        <div class="grid">
            <select id="tStation" disabled>
                <option value="Unknown">-- Awaiting Route Selection --</option>
            </select>
        </div>
        <div class="grid-2">
            <select id="tCrowd">
                <option value="Unknown">-- Crowd Level --</option>
                <option value="Empty">Almost Empty</option>
                <option value="Light">Some Seats Available</option>
                <option value="Moderate">Standing Room Only</option>
                <option value="Heavy">Extremely Crowded</option>
            </select>
            <select id="tSeat">
                <option value="Unknown">-- Traffic Intel --</option>
                <option value="Clear">Road Clear</option>
                <option value="Moderate Traffic">Moderate Traffic</option>
                <option value="Heavy Jam">Heavy Jam</option>
            </select>
        </div>
        <div class="grid-sos">
            <button id="mBtn" class="btn-action" onclick="toggleTelemetry()">INITIATE BROADCAST</button>
            <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
        </div>
    </div>
</div>

<!-- Firebase & Leaflet -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
